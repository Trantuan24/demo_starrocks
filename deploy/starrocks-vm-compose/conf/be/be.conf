# BE config for single-node VM deployment.

be_port = 9060
webserver_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060
storage_root_path = /opt/starrocks/be/storage
sys_log_dir = /opt/starrocks/be/log

# Set this if the VM has multiple NICs and StarRocks advertises the wrong IP.
# Example: priority_networks = 10.168.6.0/24
